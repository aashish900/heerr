# Build and publish the heerr Android APK to a GitHub Release when a version tag is pushed.
#
# Trigger: push to any tag matching v* (e.g. git tag v0.1.2 && git push --tags)
#
# Pipeline:
#   1. Set up Java 17 + Flutter 3.44.0
#   2. Install Dart deps + run codegen (freezed / riverpod_generator / json_serializable)
#   3. Decode keystore, convert PKCS12 → JKS (Gradle compatibility), write key.properties
#   4. flutter build apk --release
#   5. Rename APK to heerr-<tag>.apk and attach to a GitHub Release
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#
#   ANDROID_KEYSTORE_BASE64  — base64-encoded keystore.jks, encoded WITHOUT line breaks:
#                                base64 -i android/app/android/keystore.jks | tr -d '\n' | pbcopy
#                              then paste as the secret value.
#
#   ANDROID_KEY_ALIAS        — heerr
#
#   ANDROID_KEY_PASSWORD     — key password (same as store password if you pressed Enter
#                              at the keytool prompt)
#
#   ANDROID_STORE_PASSWORD   — keystore / store password
#
# APK is signed with the same keystore as local release builds.
# Losing the keystore or passwords means you cannot deliver an update to an existing
# install — you would have to uninstall (wiping secure storage) and reinstall.

name: Publish Android APK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # required to create GitHub Releases and upload assets

jobs:
  android:
    name: build + release APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      # lib/dev_defaults.dart is gitignored (holds Tailnet IPs / personal
      # username on the developer's machine). servers_screen.dart imports
      # it directly, so CI needs a copy to compile. The committed
      # dev_defaults.example.dart has all-null fields — same surface, no
      # secrets — so dropping it in here is safe.
      - name: Seed dev_defaults.dart from example (CI-only)
        run: |
          if [ ! -f lib/dev_defaults.dart ]; then
            cp lib/dev_defaults.example.dart lib/dev_defaults.dart
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > android/keystore.jks

      # Java 17 keytool creates PKCS12 keystores with modern algorithms (AES-256-CBC,
      # SHA-256 MAC) that Android Gradle Plugin's BouncyCastle cannot read. Convert to
      # legacy JKS format in CI so Gradle can sign the APK.
      - name: Convert keystore PKCS12 → JKS for Gradle compatibility
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          keytool -importkeystore \
            -srckeystore android/keystore.jks \
            -destkeystore android/keystore_jks.jks \
            -deststoretype JKS \
            -srcstorepass "${STORE_PASSWORD}" \
            -deststorepass "${STORE_PASSWORD}" \
            -noprompt 2>/dev/null
          mv android/keystore_jks.jks android/keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK (embed version in filename)
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/heerr-${{ github.ref_name }}.apk

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: android/app/build/app/outputs/flutter-apk/heerr-${{ github.ref_name }}.apk
