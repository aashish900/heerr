# Build and publish the heerr-backend Docker image to Docker Hub.
#
# Triggers:
#   - pull_request to main          → build only (no push). Validates the image
#                                     for every PR before merge.
#   - push to a git tag matching v* → build AND push to Docker Hub.
#
# Image tags produced on a tag push (e.g. `git tag v0.1.0 && git push --tags`):
#   - aashish900/heerr-backend:0.1.0    (semver full)
#   - aashish900/heerr-backend:0.1      (semver major.minor)
#   - aashish900/heerr-backend:latest   (always points at the most recent tag)
#   - aashish900/heerr-backend:sha-abc1234  (commit SHA for traceability)
#
# Platforms: linux/amd64 + linux/arm64 (multi-arch manifest).
#
# Required GitHub repo secrets:
#   - DOCKERHUB_USERNAME  → aashish900
#   - DOCKERHUB_TOKEN     → access token from Docker Hub (Account Settings →
#                           Security → New Access Token; scope: Read & Write).
#                           Do NOT use your Docker Hub password.
#
# Cache: GitHub Actions cache (type=gha). 10 GB cap, LRU eviction. Switch to
# `type=registry,ref=aashish900/heerr-backend:buildcache` if you outgrow it.

name: Publish backend image to Docker Hub

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  backend:
    name: backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch emulation for arm64 on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only log in when we're actually going to push, so secrets are not
        # surfaced to pull_request runs (which include PRs from forks).
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: aashish900/heerr-backend
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
