# Build, scan, and publish the heerr-backend Docker image to Docker Hub.
#
# Triggers:
#   - pull_request to main          → build + trivy scan only (no push).
#                                     Validates the image for every PR.
#   - push to a git tag matching v* → build + trivy scan + push to Docker Hub.
#
# Pipeline:
#   1. Build single-arch (amd64) locally with `load: true` so a concrete
#      image exists in the runner's daemon — trivy needs a loadable image
#      (it can't scan a multi-arch manifest without pulling each platform).
#   2. Trivy scan: fail the workflow on HIGH or CRITICAL CVEs in OS
#      packages or python deps. This gate runs on every PR + every tag.
#   3. (Tag refs only) build multi-arch (amd64 + arm64) and push. BuildKit
#      cache means the amd64 layers from step 1 are reused.
#
# Image tags produced on a tag push (e.g. `git tag v0.1.0 && git push --tags`):
#   - aashish900/heerr-backend:0.1.0    (semver full)
#   - aashish900/heerr-backend:0.1      (semver major.minor)
#   - aashish900/heerr-backend:latest   (always points at the most recent tag)
#   - aashish900/heerr-backend:sha-abc1234  (commit SHA for traceability)
#
# Platforms: linux/amd64 + linux/arm64 (multi-arch manifest).
#
# Required GitHub repo secrets:
#   - DOCKERHUB_USERNAME  → aashish900
#   - DOCKERHUB_TOKEN     → access token from Docker Hub (Account Settings →
#                           Security → New Access Token; scope: Read & Write).
#                           Do NOT use your Docker Hub password.
#
# Cache: GitHub Actions cache (type=gha). 10 GB cap, LRU eviction. Switch to
# `type=registry,ref=aashish900/heerr-backend:buildcache` if you outgrow it.

name: Publish backend image to Docker Hub

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  backend:
    name: backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (cross-arch emulation for arm64 on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (amd64, local load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          load: true
          tags: heerr-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: heerr-backend:scan
          format: table
          severity: HIGH,CRITICAL
          # Fail the workflow on any unfixed CVE at HIGH+ severity. Use
          # `ignore-unfixed: true` if upstream-unfixed CVEs become noisy.
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Log in to Docker Hub
        # Only log in when we're actually going to push, so secrets are not
        # surfaced to pull_request runs (which include PRs from forks).
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: aashish900/heerr-backend
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
