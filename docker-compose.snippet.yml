# heerr — arr-stack integration snippet
# ==========================================================================
# These services append to your existing arr-stack docker-compose.yml
# (~/docker/arr-stack/docker-compose.yml). Copy the services below +
# the `networks:` block into the arr-stack file, copy `.env.example` to
# `.env` next to the merged compose file, fill in real values, and run:
#   docker compose up -d heerr-postgres-init heerr-podcasts-init heerr-postgres heerr-migrate heerr-backend
#
# Already deployed and hitting "Permission denied" writing to
# /data/media/podcasts (#53)? heerr-podcasts-init is new — pull this file,
# then either `docker compose up -d heerr-podcasts-init` (recreates
# heerr-backend automatically via the new depends_on) or run the chown by
# hand: `mkdir -p /data/media/podcasts && chown -R 1000:1000 /data/media/podcasts`.
#
# Connectivity: Tailscale-only — no host port publication. The arr-stack
# subnet (172.39.0.0/24) is expected to be Tailscale-routable from the
# tailnet via the host's tailscaled.
#
# Required env vars in `.env` (see `.env.example` for the full list):
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
#   DATABASE_URL
#   MUSIC_OUTPUT_DIR
#   NAVIDROME_URL              ← identity provider; backend boot fails fast
#                                if unset. Use the tailnet URL of Navidrome,
#                                never a public address.
# ==========================================================================

services:

  # One-shot: chown the bind-mount dir to the Postgres image's UID (999) so
  # the postgres container can write its data files. Required because the
  # bind mount is created with root ownership on first compose up.
  heerr-postgres-init:
    image: alpine:3.20
    container_name: heerr-postgres-init
    command:
      - sh
      - -c
      - "mkdir -p /data/postgres && chown -R 999:999 /data/postgres"
    volumes:
      - /data/postgres:/data/postgres
    restart: "no"

  # One-shot: chown the podcast-episode bind-mount dir to the backend
  # image's non-root user (UID/GID 1000, see backend/Dockerfile) so
  # heerr-backend can write downloaded episodes. Required for the same
  # reason as heerr-postgres-init above — the bind mount is created with
  # root ownership on first `docker compose up`, and (unlike
  # /data/media/music, whose ownership predates this backend and is
  # managed by the existing arr-stack/Navidrome setup) nothing else on the
  # host ever chowns this newer path. Missing this step is the root cause
  # of "Permission denied" writing to /data/media/podcasts (#53).
  heerr-podcasts-init:
    image: alpine:3.20
    container_name: heerr-podcasts-init
    command:
      - sh
      - -c
      - "mkdir -p /data/media/podcasts && chown -R 1000:1000 /data/media/podcasts"
    volumes:
      - /data/media/podcasts:/data/media/podcasts
    restart: "no"

  heerr-postgres:
    image: pgvector/pgvector:pg17
    container_name: heerr-postgres
    env_file:
      - .env
    environment:
      PGDATA: /data/postgres
    volumes:
      - /data/postgres:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    depends_on:
      heerr-postgres-init:
        condition: service_completed_successfully
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      arrnetwork:
        ipv4_address: 172.39.0.50
    restart: unless-stopped

  # One-shot: applies Alembic migrations. Exits 0 on success. backend waits
  # on this service_completed_successfully so the DB schema is ready when
  # uvicorn starts.
  heerr-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aashish010/heerr-backend:latest
    container_name: heerr-migrate
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      heerr-postgres:
        condition: service_healthy
    networks:
      - arrnetwork
    restart: "no"

  heerr-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aashish010/heerr-backend:latest
    container_name: heerr-backend
    env_file:
      - .env
    volumes:
      # Navidrome watches the host path and indexes new files within ~1 min.
      - /data/media/music:/data/media/music:rw
      # Podcast episodes (Phase P, #53) — deliberately NOT Navidrome-watched;
      # the backend serves this audio itself (GET /podcasts/episodes/{id}/audio).
      - /data/media/podcasts:/data/media/podcasts:rw
    healthcheck:
      # Python urllib is in the slim image; avoids adding curl just for this.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health',timeout=2); sys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      heerr-migrate:
        condition: service_completed_successfully
      heerr-podcasts-init:
        condition: service_completed_successfully
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      arrnetwork:
        ipv4_address: 172.39.0.51
    restart: unless-stopped


networks:
  # External: the arrnetwork Docker network must already exist (created by
  # the arr-stack compose). `name: arrnetwork` matches the `name:` field
  # in the arr-stack docker-compose.yml networks section.
  arrnetwork:
    external: true
    name: arrnetwork
