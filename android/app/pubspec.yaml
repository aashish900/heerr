name: heerr
description: heerr Android client — thin REST client for the heerr FastAPI backend.
publish_to: 'none'

version: 4.7.0

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State management — locked per docs/DECISIONLOG.md 2026-06-09 "Stack".
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # HTTP
  dio: ^5.7.0

  # JSON / models (annotations only at runtime; codegen happens via dev_deps)
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Persistence
  flutter_secure_storage: ^9.2.0

  # Navigation
  go_router: ^14.6.0

  # md5 for Subsonic auth token: t = md5(password + salt). Stdlib doesn't
  # ship a hashing impl; `crypto` is the dart-lang-maintained package.
  crypto: ^3.0.0

  # Audio playback (J1). just_audio drives the actual stream/decode/buffer;
  # audio_service wires playback into Android's MediaSession + foreground
  # notification + lock-screen controls; audio_session manages OS-level
  # audio focus + interruptions (calls, other media apps).
  just_audio: ^0.10.0
  audio_service: ^0.18.0
  audio_session: ^0.2.0

  # Stream combinators (combineLatest2 to fuse the current MediaItem and
  # PlaybackState into a single snapshot for the mini-player + Now Playing
  # at J2). rxdart is already a transitive dep via audio_service; listing
  # it explicitly avoids the `depend_on_referenced_packages` lint.
  rxdart: ^0.28.0

  # Dominant-colour extraction from cover art (K1). Used by Now Playing to
  # tint the surface based on the current track's album art. Fail-soft:
  # extraction errors fall back to the default M3 dark surface.
  palette_generator: ^0.3.0

  # Local filesystem paths for the offline-download feature (L1+). Used by
  # offline/offline_paths.dart to resolve the app-private documents dir.
  path_provider: ^2.1.0

  # #37: gallery pick for the profile avatar. Downscales at pick time
  # (maxWidth/maxHeight 512, quality 85) so the stored file stays small;
  # uses the Android 13+ photo picker — no storage permission needed.
  image_picker: ^1.1.0

  # A5: plain (non-secret) key-value store for the offline-download
  # preferences. These aren't secrets, so they were moved out of
  # flutter_secure_storage / EncryptedSharedPreferences to avoid the
  # keystore round-trip on every read. See providers/prefs_storage.dart.
  shared_preferences: ^2.2.0

  # WiFi-only gate for the offline sync (L2 actually uses it; landed at L1
  # so deps churn is one commit). Permission ACCESS_NETWORK_STATE is
  # implicit on Android — no AndroidManifest edit needed.
  connectivity_plus: ^6.0.0

  # Q1: WorkManager-driven background offline sync. Calls into the existing
  # `OfflineSync` notifier code path from a separate background isolate via
  # `Workmanager().executeTask(...)`. See DECISIONLOG.md 2026-06-15
  # ("v2.0.0 — background offline sync") for the architectural rationale.
  workmanager: ^0.9.0

  # Material Icons font is enabled in the `flutter:` section below; no extra
  # font deps needed for the dark M3 theme.

  # SVG rendering — used for the custom Library tab icon (Spotify-style
  # 3D stack) that Material Icons doesn't carry.
  flutter_svg: ^2.0.0
  home_widget: ^0.9.3
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0

  # Lint config — see analysis_options.yaml for the active rules.
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.0

  # Test helpers — mocktail over mockito (no codegen, stronger types).
  mocktail: ^1.0.4

  # Deterministic timer/microtask control for polling-provider tests
  # (queue/job-detail at D2/D3). Already a transitive dep of flutter_test;
  # listed explicitly so the import isn't a depend_on_referenced_packages
  # warning.
  fake_async: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  image_path: "assets/icon_legacy.png"
  android: true
  ios: false
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"
